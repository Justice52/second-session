  <div class="notification-status" id="notificationStatus">

  <h1 id="question">Will you be my girlfriend?</h1>

    <button id="noBtn">No</button>
  </div>

  <div class="message" id="message"></div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const question = document.getElementById('question');
    const message = document.getElementById('message');
    const notificationStatus = document.getElementById('notificationStatus');
    let noClicks = 0;

    // Request notification permission on page load

      if (!("Notification" in window)) {

        }

      notificationStatus.textContent = "Notifications: Disabled ❌";
      return false;

    function sendWhatsAppMessage(message) {
      const encodedMessage = encodeURIComponent(message);
      const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;
      window.open(whatsappUrl, '_blank');
    }

    function sendNotification(title, body, whatsappMessage, icon = "💕") {
      // Send WhatsApp message
      if (whatsappMessage) {
        sendWhatsAppMessage(whatsappMessage);

        new Notification(title, {
          body: body,

        "🎉"
      );
    });

      noClicks++;

        );

        question.textContent = "Please... 🥺";
        moveButtonRandomly(noBtn);
        sendNotification(
          "Persistence mode activated! 🥺",

          "Aww... now you're giving me the puppy dog eyes! 🥺💕 This is actually pretty cute... You're not giving up, are you? 😊",
          "🥺"
        );
      } else if (noClicks === 4) {
        document.body.style.animation = 'glitch 0.3s infinite';
        question.textContent = "System Error... Accepting is mandatory 😵";
        sendNotification(
          "SYSTEM ERROR! 🚨", 
          "The matrix is glitching! Resistance is futile!",
          "WHOA! 🚨 Your page just went full Matrix mode and started glitching! 😵 It says 'resistance is futile' - you're really committed to this! 😂🤖",
          "🚨"
        );
      } else {
        noBtn.remove();
        question.textContent = "Only one choice remains 😈";
        sendNotification(
          "No choice left! 😈", 
          "The no button has been eliminated. Choose wisely...",
          "OK you win! 😈 You literally made the 'No' button disappear! Now there's only one choice left... You're pretty clever! 😏💕",
          "😈"
        );
      }
    });

    function moveButtonRandomly(button) {
      const btnWidth = button.offsetWidth;
      const btnHeight = button.offsetHeight;
      const x = Math.random() * (window.innerWidth - btnWidth - 20);
      const y = Math.random() * (window.innerHeight - btnHeight - 20);

        sendWhatsAppMessage("Hey! Someone just sent me this super cute 'Will you be my girlfriend?' page! 💕 Want to see how I respond? 😊✨");
